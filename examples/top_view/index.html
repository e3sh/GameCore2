<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameCore2 - Top View Example</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #gameCanvas {
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            image-rendering: pixelated;
        }
        #infoPanel {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-family: monospace;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="infoPanel">
        <h3>Top View Demo</h3>
        <p>Arrow Keys: Move</p>
        <p>Space: Jump (Z-axis)</p>
        <p>Notice: Y-sort and Z-axis jump (zoom)</p>
        <div id="debugInfo"></div>
    </div>
    <script type="module" src="./main.js"></script>
</body>
</html>
