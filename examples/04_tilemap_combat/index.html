<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=640, user-scalable=no">
    <title>タイルマップと戦闘デモ / Tilemap & Combat Demo</title>
    <style>
        body {
            background: #111;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            overflow: hidden;
        }

        canvas {
            background: black;
            border: 4px solid #333;
            image-rendering: pixelated;
        }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }

        .btn-start {
            padding: 20px 60px;
            font-size: 32px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 2px solid #aaa;
            border-radius: 12px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-start:hover {
            background: #666;
        }
    </style>
</head>

<body>
    <div id="gameContainer" style="position:relative;">
        <canvas id="mainCanvas" width="640" height="400"></canvas>
        <div id="overlay">
            <h1 style="margin-bottom: 40px; font-size: 48px; text-shadow: 0 0 10px #0ff;">TILEMAP & COMBAT</h1>
            <button class="btn-start" id="startButton">PUSH START</button>
            <p style="color: #666; margin-top: 20px;">Powered by GameCore Engine</p>
        </div>
    </div>
    <script>
        window.addEventListener('error', function (event) {
            const errDiv = document.createElement('div');
            errDiv.style = "position:absolute; top:0; left:0; background:red; color:white; padding:20px; z-index:9999;";
            errDiv.innerText = "Error: " + event.message + "\n at " + event.filename + ":" + event.lineno;
            document.body.appendChild(errDiv);
        });
        window.addEventListener('unhandledrejection', function (event) {
            const errDiv = document.createElement('div');
            errDiv.style = "position:absolute; top:0; left:0; background:red; color:white; padding:20px; z-index:9999;";
            errDiv.innerText = "Unhandled Promise Rejection: " + event.reason;
            document.body.appendChild(errDiv);
        });
    </script>
    <script type="module" src="main.js?v=2"></script>
</body>

</html>
