<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Input Test</title>
    <style>
        body {
            background: #222;
            color: #fff;
            font-family: monospace;
            padding: 20px;
        }

        .row {
            display: flex;
            margin-bottom: 5px;
        }

        .label {
            width: 100px;
            font-weight: bold;
        }

        .val {
            width: 80px;
            padding: 2px 10px;
            background: #444;
            text-align: center;
        }

        .active {
            background: #4caf50;
            color: white;
        }

        .active-trigger {
            background: #ff9800;
            color: white;
        }

        #log {
            margin-top: 20px;
            height: 300px;
            overflow-y: scroll;
            background: #111;
            padding: 10px;
            border: 1px solid #555;
        }
    </style>
</head>

<body>
    <h1>Input System Test</h1>
    <p>Please press Arrow keys, Space, or Enter.</p>

    <canvas id="mainCanvas" width="320" height="240" style="display:none;"></canvas>

    <div id="status"></div>
    <div id="log"></div>

    <script type="module">
        import { GameCore } from '../../src/core/gamecore.js';

        const engine = new GameCore({ canvasId: "mainCanvas", screen: [{ resolution: { w: 320, h: 240 } }] });

        engine.input.bind('Up', 'keyboard', 'ArrowUp');
        engine.input.bind('Down', 'keyboard', 'ArrowDown');
        engine.input.bind('Left', 'keyboard', 'ArrowLeft');
        engine.input.bind('Right', 'keyboard', 'ArrowRight');
        engine.input.bind('Jump', 'keyboard', 'ArrowUp');
        engine.input.bind('Jump', 'keyboard', 'Space');
        engine.input.bind('Select', 'keyboard', 'Enter');

        const actions = ['Up', 'Down', 'Left', 'Right', 'Jump', 'Select'];
        const statusDiv = document.getElementById('status');
        const logDiv = document.getElementById('log');

        function renderStatus() {
            let html = '';
            for (const action of actions) {
                const isPressed = engine.input.isPressed(action);
                const isDown = engine.input.isDown(action);
                const isUp = engine.input.isUp(action);

                html += `<div class="row">
                    <div class="label">${action}</div>
                    <div class="val ${isPressed ? 'active' : ''}">isPressed: ${isPressed}</div>
                    <div class="val ${isDown ? 'active-trigger' : ''}">isDown: ${isDown}</div>
                    <div class="val ${isUp ? 'active-trigger' : ''}">isUp: ${isUp}</div>
                </div>`;

                if (isDown) logMessage(`[DOWN] ${action}`);
                if (isUp) logMessage(`[UP] ${action}`);
            }
            statusDiv.innerHTML = html;
        }

        function logMessage(msg) {
            const el = document.createElement('div');
            el.textContent = `${new Date().toISOString().substring(11, 23)} - ${msg}`;
            logDiv.prepend(el);
        }

        const originalUpdate = engine.update;
        engine.update = function () {
            originalUpdate.call(engine);
            renderStatus();
        };

        engine.run();
    </script>
</body>

</html>
